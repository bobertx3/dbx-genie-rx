# Databricks Apps configuration
# See: https://docs.databricks.com/dev-tools/databricks-apps/
#
# This app uses user-based (OBO) authentication, meaning users can only
# access Genie Spaces they have permission to manage.
#
# The FastAPI server serves both:
# - Static React frontend files from /dist (built by Databricks Apps from root package.json)
# - REST API endpoints under /api

command:
  - "uvicorn"
  - "agent_server.start_server:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_REGISTRY_URI
    value: "databricks-uc"
  - name: MLFLOW_EXPERIMENT_ID
    value: ""  # OPTIONAL: Set to your MLflow experiment ID to enable tracing
  - name: LLM_MODEL
    value: "databricks-claude-sonnet-4-6"
  - name: SQL_WAREHOUSE_ID
    value: ""  # Optional fallback — users can enter this in the UI
  - name: GENIE_TARGET_DIRECTORY
    value: ""  # Optional fallback — users can enter this in the UI

# OBO (On-Behalf-Of) user authentication
# The app acts on behalf of the logged-in user via the x-forwarded-access-token
# header injected by the Databricks Apps proxy. Users can only access resources
# they already have permission to:
#   1. Genie Spaces: User needs "Can Edit" or "Can Manage" permission
#   2. LLM Serving Endpoints: User needs "Can Query" permission
#   3. SQL Warehouses: User needs "Can Use" permission
#   4. Target Directory (for creating new Genie Spaces): User needs write permission
# No service principal grants are needed.
